services:
  # Inventory API Service
  inventory-api:
    build: .
    container_name: inventory-api
    ports:
      - "8082:8080"  # Puerto diferente para evitar conflicto con product-api
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-docker}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-jdbc:postgresql://java-product-api-postgres-dev:5432/inventoryapi}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:-dev}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-devpass123}
      - EXTERNAL_PRODUCTS_SERVICE_BASE_URL=${EXTERNAL_PRODUCTS_SERVICE_BASE_URL:-http://java-product-api-app-dev:8080}
      - PRODUCTS_API_KEY=${PRODUCTS_API_KEY:-your-secret-api-key-here}
      - APP_API_KEY=${APP_API_KEY:-your-secret-api-key-here}
      - DATABASE_SEEDING_ENABLED=${DATABASE_SEEDING_ENABLED:-true}
      - LOKI_URL=${LOKI_URL:-http://loki:3100/loki/api/v1/push}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# Red externa que se conecta con la red del product-api
networks:
  default:
    external: true
    name: java-product-api_backend-net