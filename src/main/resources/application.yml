server:
  port: 8080

spring:
  application:
    name: java-inventory-api
  datasource:
    url: jdbc:postgresql://localhost:5432/inventory_db
    username: inventory_user
    password: inventory_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    create-schemas: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

# External Services
external:
  products-service:
    base-url: http://localhost:8080
    api-key: ${PRODUCTS_API_KEY:your-secret-api-key-here}
    timeout: 5000
    max-retries: 3

# Application API Security
app:
  api:
    key: ${APP_API_KEY:your-secret-api-key-here}

# Database Configuration
database:
  seeding:
    enabled: ${DATABASE_SEEDING_ENABLED:true}

# Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      products-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      products-service:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2

# Management
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

# Logging
logging:
  level:
    com.inventory: INFO
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"