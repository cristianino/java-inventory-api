version: '3.8'

services:
  # Inventory API Service (Development)
  inventory-api-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: inventory-api-dev
    ports:
      - "8082:8080"  # Puerto 8082 para evitar conflicto con product-api
      - "5006:5005"  # Puerto de debug (cambiado a 5006 para evitar conflicto)
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://java-product-api-postgres-dev:5432/inventoryapi
      - SPRING_DATASOURCE_USERNAME=dev
      - SPRING_DATASOURCE_PASSWORD=devpass123
      - EXTERNAL_PRODUCTS_SERVICE_BASE_URL=http://java-product-api-app-dev:8080
      - PRODUCTS_API_KEY=your-secret-api-key-here
      - JAVA_OPTS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
    networks:
      - java-product-api_dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  java-product-api_dev-network:
    external: true